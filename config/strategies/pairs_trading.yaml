enabled: true
capital_allocation_pct: 25.0
max_positions: 5
params:
  # Lookback period for cointegration test (daily bars)
  lookback_bars: 252

  # Z-score thresholds
  entry_z_threshold: 2.0     # Enter when |z| > this
  exit_z_threshold: 0.5      # Exit when |z| < this (profit target)
  stop_z_threshold: 3.0      # Exit when |z| > this (stop loss)

  # Position management
  max_hold_days: 7           # Time-based swing exit
  max_simultaneous_pairs: 5  # Max concurrent pair positions

  # Statistical requirements
  min_correlation: 0.7       # Minimum Pearson correlation
  cointegration_pvalue: 0.05 # Max p-value for Engle-Granger test

  # Sizing
  per_pair_capital_pct: 2.0  # % of total capital per pair

  # Data
  use_daily_bars: true
  bar_timeframe: "1Day"

  # Pairs universe — override default pairs here
  # pairs:
  #   - symbol_a: "XOM"
  #     symbol_b: "CVX"
  #     sector: "energy"
  #   - symbol_a: "JPM"
  #     symbol_b: "BAC"
  #     sector: "financials"
