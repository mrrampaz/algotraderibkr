enabled: false  # Parked - no edge in current market regime, see CLAUDE.md
capital_allocation_pct: 10.0
max_positions: 3
params:
  mode: "daily_ma"
  lookback_days: 20
  max_hold_days: 3

  # Universe - large-cap only
  universe:
    - SPY
    - QQQ
    - AAPL
    - MSFT
    - AMZN
    - GOOG
    - META
    - NVDA
    - JPM
    - V

  # Entry
  min_z_score: 2.0               # Z-score from MA20 for entry
  allow_high_vol: true
  high_vol_min_z_score: 2.5
  trending_min_z_score: 2.5      # Require larger stretch in trending regimes
  min_volume_ratio: 1.0          # At least average volume
  max_spread_pct: 0.15           # Tight spread for mean reversion

  # Exit
  exit_z_score: 0.5              # Close when z reverts to 0.5
  stop_pct: 0.5
  target_pct: 1.0

  bar_timeframe: "1Day"

  # Regime filter
  allowed_regimes:
    - ranging
    - low_vol
    - high_vol
    - trending_down
    - trending_up
