enabled: true
capital_allocation_pct: 15.0
max_positions: 3
params:
  # Underlyings
  underlyings:
    - SPY
    - QQQ

  # Structure
  structure: "credit_spread"      # "credit_spread" or "iron_condor"
  short_delta_target: 14          # Target delta for short strike (10-16)
  wing_width: 5                   # Points between short and long strikes

  # Entry window
  entry_start_hour: 10
  entry_start_minute: 15
  entry_end_hour: 10
  entry_end_minute: 45

  # DTE
  target_dte: 0                   # 0DTE (same day expiry)
  max_dte: 2                      # Fallback if 0DTE not available

  # Filters
  min_vix_proxy: 15.0             # Only sell when vol is elevated enough
  use_sma5_filter: true           # Contrarian SMA5 filter
  credit_estimate_pct: 0.30       # Rough credit estimate as % of spread width
  min_credit_per_spread: 50.0     # Skip low-credit setups (pre-commission)
  min_credit_per_contract: 10.0   # Hard floor: $10 credit minimum per contract (0.10 option price)
  min_credit_to_max_loss_ratio: 0.05  # Credit must be at least 5% of max loss per contract
  require_live_credit_estimate: true  # Skip entries when live option-chain credit cannot be estimated
  max_commission_per_spread: 4.0  # Est. round-trip commission per 1-lot spread
  win_rate_credit_spread: 0.70    # Baseline win rate assumption for credit spreads
  win_rate_iron_condor: 0.72      # Baseline win rate assumption for iron condors
  event_day_confidence_penalty: 0.25

  # Exit
  profit_target_pct: 50.0         # Close at 50% of max profit
  stop_loss_pct: 200.0            # Close at 200% of credit received (loss)
  min_hold_minutes_for_profit_target: 60  # Avoid premature profit exits in first hour
  close_before_minutes: 15        # Close 15 min before market close
  expiry_risk_close_minutes: 15   # Force-close expiring options by 3:45 PM ET

  # Sizing
  max_risk_per_trade: 500         # Legacy fallback for non-spread sizing paths
  max_contracts: 5                # Absolute safety cap across all sizing modes
  max_contracts_per_spread: 5     # Brain adaptive sizing can still lower this at runtime
  sizing_method: "max_loss"       # "max_loss" for credit spreads, legacy "exercise_exposure" otherwise
  max_loss_risk_budget_pct: 2.0   # Size spread risk off 2% of account equity
  exercise_exposure_cap_pct: 20.0 # Cap assignment/exercise notional to 20% of equity

  # Regime filter
  allowed_regimes:
    - high_vol
    - ranging
    - trending_up
    - trending_down
  blocked_regimes:
    - event_day                    # Don't sell premium on FOMC/CPI days
